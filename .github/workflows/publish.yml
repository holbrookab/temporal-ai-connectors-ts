name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag to publish under"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - latest
          - next
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        required: true
        default: false
        type: boolean
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Resolve publish tag
        id: publish
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package version is unpublished
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published. Bump package.json version before publishing."
            exit 1
          fi

      - name: Publish
        shell: bash
        run: |
          npm --version
          ARGS=(--access public --tag "${{ steps.publish.outputs.tag }}")
          if [ "${{ steps.publish.outputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          npm publish "${ARGS[@]}"
